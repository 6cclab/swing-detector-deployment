apiVersion: v1
kind: Service
metadata:
  name: swing-detector-redis
  labels:
    app.kubernetes.io/name: swing-detector-redis
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app.kubernetes.io/name: swing-detector-redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: swing-detector-redis
  labels:
    app.kubernetes.io/name: swing-detector-redis
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: swing-detector-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: swing-detector-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
