# Go API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: swing-detector-api
  labels:
    app.kubernetes.io/name: swing-detector-api
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: swing-detector-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: swing-detector-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/health"
    spec:
      containers:
        - name: api
          image: repoflow.6cclab.dev/6cclab/apps/swing-detector-api:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: swing-detector-secrets
          env:
            - name: PORT
              value: "8000"
            - name: REDIS_URL
              value: redis://swing-detector-redis:6379
            - name: S3_ENDPOINT
              value: http://garage.garage.svc:3900
            - name: S3_BUCKET
              value: swing-iq
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "30"]
      volumes:
        - name: tmp
          emptyDir: {}
---
# Python ML Worker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: swing-detector-worker
  labels:
    app.kubernetes.io/name: swing-detector-worker
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: swing-detector-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: swing-detector-worker
    spec:
      containers:
        - name: worker
          image: repoflow.6cclab.dev/6cclab/apps/swing-detector-worker:latest
          envFrom:
            - secretRef:
                name: swing-detector-secrets
          env:
            - name: MODEL_CHECKPOINT_DIR
              value: /app/checkpoints
            - name: REDIS_URL
              value: redis://swing-detector-redis:6379
            - name: S3_ENDPOINT
              value: http://garage.garage.svc:3900
            - name: S3_BUCKET
              value: swing-iq
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: checkpoints
              mountPath: /app/checkpoints
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: checkpoints
          persistentVolumeClaim:
            claimName: swing-detector-checkpoints
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: swing-detector-checkpoints
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
