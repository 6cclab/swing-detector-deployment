apiVersion: batch/v1
kind: Job
metadata:
  name: swing-detector-migrate
  labels:
    app.kubernetes.io/name: swing-detector-migrate
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: repoflow.6cclab.dev/apps/swing-detector/api:latest
          command: ["/migrate", "-direction", "up", "-path", "file:///migrations"]
          envFrom:
            - secretRef:
                name: swing-detector-secrets
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
