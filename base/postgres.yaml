apiVersion: v1
kind: Service
metadata:
  name: swing-detector-postgres
  labels:
    app.kubernetes.io/name: swing-detector-postgres
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app.kubernetes.io/name: swing-detector-postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: swing-detector-postgres
  labels:
    app.kubernetes.io/name: swing-detector-postgres
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  serviceName: swing-detector-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: swing-detector-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: swing-detector-postgres
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          args:
            - "-c"
            - "ssl=on"
            - "-c"
            - "ssl_cert_file=/etc/postgres-tls/tls.crt"
            - "-c"
            - "ssl_key_file=/etc/postgres-tls/tls.key"
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: swing
            - name: POSTGRES_DB
              value: swing_detector
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: swing-detector-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: postgres-tls
              mountPath: /etc/postgres-tls
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: postgres-tls
          secret:
            secretName: swing-postgres-tls
            defaultMode: 0640
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
