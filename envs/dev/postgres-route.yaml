# Exposes the in-cluster Postgres over Traefik's shared `postgres` TCP
# entrypoint (port 5432) via TLS SNI. Passthrough mode leaves the actual
# TLS handshake to Postgres itself — Traefik only sniffs the SNI from
# the ClientHello to pick a backend, so the client must use a Postgres
# driver that does a *direct* SSL connection (set `sslmode=require` and
# for Postgres 17+ clients `sslnegotiation=direct`; older clients get
# it automatically if StartTLS is unsupported).
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: swing-postgres-cert
spec:
  secretName: swing-postgres-tls
  issuerRef:
    name: letsencrypt-dev
    kind: ClusterIssuer
  dnsNames:
    - swing-db.dev-01.6cclab.dev
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransportTCP
metadata:
  name: swing-postgres-transport
spec:
  dialTimeout: 30s
  dialKeepAlive: 30s
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: swing-postgres
spec:
  entryPoints:
    - postgres
  routes:
    - match: HostSNI(`swing-db.dev-01.6cclab.dev`)
      services:
        - name: swing-detector-postgres
          port: 5432
          serversTransport: swing-postgres-transport
  tls:
    passthrough: true
