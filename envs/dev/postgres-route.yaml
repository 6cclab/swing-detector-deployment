---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: swing-postgres-cert
spec:
  secretName: swing-postgres-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - swing-db.dev-01.6cclab.dev
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: swing-postgres
spec:
  entryPoints:
    - postgres
  routes:
    - match: HostSNI(`swing-db.dev-01.6cclab.dev`)
      services:
        - name: swing-detector-postgres
          port: 5432
  tls:
    secretName: swing-postgres-tls
